      padding: 0;
      box-sizing: border-box;
    }

      font-family: 'Inter', system-ui, -apple-system, 'Arial', sans-serif;
      color: #141413;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Custom CSS variables - Claude warm palette */
    :root {
      --parchment: #f5f4ed;
      --ivory: #faf9f5;
      --warm-sand: #e8e6dc;
      --terracotta: #c96442;
      --coral: #d97757;
      --near-black: #141413;
      --charcoal-warm: #4d4c48;
      --olive-gray: #5e5d59;
      --stone-gray: #87867f;
      --dark-surface: #30302e;
      --border-cream: #f0eee6;
      --border-warm: #e8e6dc;
      --warm-silver: #b0aea5;
    }

    /* Animation keyframes */
    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(50px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInScale {
      0% {
        opacity: 0;
        transform: scale(0.9);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes glowPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(201, 100, 66, 0.2);
        opacity: 0.7;
      }
      70% {
        box-shadow: 0 0 0 20px rgba(201, 100, 66, 0);
        opacity: 1;
      }
      100% {
        box-shadow: 0 0 0 0 rgba(201, 100, 66, 0);
        opacity: 0.7;
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    @keyframes borderGlow {
      0% {
        border-color: var(--border-cream);
      }
      50% {
        border-color: var(--terracotta);
      }
      100% {
        border-color: var(--border-cream);
      }
    }

    /* Animation classes */
    .animate-fade-up {
      animation: fadeInUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }

    .animate-fade-scale {
      animation: fadeInScale 0.7s ease-out forwards;
    }

    .animate-float {
      animation: float 5s ease-in-out infinite;
    }

    .glow-ring {
      animation: glowPulse 2.5s ease-in-out infinite;
    }

    /* Scroll reveal - intersection observer */
    .reveal-on-scroll {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .reveal-on-scroll.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* Warm shadows & rings */
    .ring-warm {
      box-shadow: 0px 0px 0px 1px var(--border-warm);
    }

    .ring-terracotta {
      box-shadow: 0px 0px 0px 1px var(--terracotta);
    }

    .whisper-shadow {
      box-shadow: rgba(0, 0, 0, 0.04) 0px 4px 20px;
    }

    .hover-lift {
      transition: all 0.25s ease;
    }

    .hover-lift:hover {
      transform: translateY(-3px);
      box-shadow: rgba(0, 0, 0, 0.08) 0px 15px 30px;
    }

    /* Typography */
    .font-serif {
      font-family: 'Playfair Display', Georgia, serif;
    }

    .font-sans {
      font-family: 'Inter', system-ui, Arial, sans-serif;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--border-cream);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--terracotta);
      border-radius: 4px;
    }

    /* Smooth transitions */
    a, button {
      transition: all 0.2s ease;
    }
  </style>
</head>

    const useScrollReveal = () => {

            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('revealed');
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1, rootMargin: "0px 0px -30px 0px" }
        );
        elements.forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, []);
    };

              color: 'var(--terracotta)',
              borderBottom: '1px solid rgba(201, 100, 66, 0.3)',
              textDecoration: 'none',
              paddingBottom: '4px',
              transition: 'border-color 0.2s'
            }}
            onMouseEnter={e => e.target.style.borderColor = 'var(--terracotta)'}
            onMouseLeave={e => e.target.style.borderColor = 'rgba(201, 100, 66, 0.3)'}>
              View all GitHub repositories →
            </a>
          </div>
        </div>
      </section>
    );

    // Social / Connect Section
    const Connect = () => (
      <section id="connect" style={{ backgroundColor: 'var(--near-black)', padding: '100px 32px' }}>
        <div className="reveal-on-scroll" style={{ maxWidth: '800px', margin: '0 auto', textAlign: 'center' }}>
          <span style={{
            display: 'inline-block',
            padding: '4px 16px',
            backgroundColor: 'var(--dark-surface)',
            borderRadius: '40px',
            color: 'var(--warm-silver)',
            fontSize: '12px',
            border: '1px solid #30302e',
            marginBottom: '24px'
          }}>
            LET'S CONNECT
          </span>
          <h2 className="font-serif" style={{ fontSize: 'clamp(36px, 6vw, 52px)', fontWeight: 700, color: 'var(--ivory)', marginBottom: '20px' }}>
            Reach out directly
          </h2>
          <p style={{ color: 'var(--warm-silver)', fontSize: '18px', lineHeight: 1.6, maxWidth: '550px', margin: '0 auto 48px' }}>
            I'm open for backend engineering roles, Rust collaborations, or thoughtful conversations about distributed systems.
          </p>
          
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: '12px', marginBottom: '48px' }}>
            {socialLinks.map((social, idx) => (
              <a key={idx} href={social.url} target="_blank" rel="noopener noreferrer" style={{
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
                padding: '14px 20px',
                backgroundColor: 'var(--dark-surface)',
                borderRadius: '14px',
                textDecoration: 'none',
                color: 'var(--warm-silver)',
                transition: 'all 0.2s'
              }}
              onMouseEnter={e => { e.target.style.backgroundColor = 'var(--terracotta)'; e.target.style.transform = 'translateY(-2px)'; e.target.style.color = 'white'; }}
              onMouseLeave={e => { e.target.style.backgroundColor = 'var(--dark-surface)'; e.target.style.transform = 'none'; e.target.style.color = 'var(--warm-silver)'; }}>
                <span style={{ fontWeight: 500 }}>{social.name}</span>
                <span style={{ fontSize: '12px', opacity: 0.7 }}>{social.handle}</span>
              </a>
            ))}
          </div>
          
          <div style={{ borderTop: '1px solid rgba(48, 48, 46, 0.5)', paddingTop: '32px', fontSize: '13px', color: 'var(--stone-gray)' }}>
            Discord community active • always eager to build meaningful tech
          </div>
        </div>
      </section>
    );

    // Footer
    const Footer = () => (
      <footer style={{
        backgroundColor: 'var(--parchment)',
        borderTop: '1px solid var(--border-cream)',
        padding: '32px',
        textAlign: 'center',
        color: 'var(--stone-gray)',
        fontSize: '13px'
      }}>
        <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
          <p>© 2025 0xcRachel (Tùng Dương) — warm, minimal, and built with modern craft</p>
          <div style={{ display: 'flex', justifyContent: 'center', gap: '24px', marginTop: '12px', fontSize: '12px' }}>
            <span>Laravel</span>
            <span>Rust</span>
            <span>Zig</span>
            <span>Next.js</span>
            <span>NestJS</span>
          </div>
        </div>
      </footer>
    );

    // Main App Component
    const App = () => {
      const [loaded, setLoaded] = useState(false);
      useScrollReveal();
      
      useEffect(() => {
        setTimeout(() => setLoaded(true), 100);
      }, []);
      
      return (
        <div style={{ backgroundColor: 'var(--parchment)' }}>
          <Header />
          <main>
            <Hero loaded={loaded} />
            <About />
            <Skills />
            <Projects />
            <Connect />
          </main>
          <Footer />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
